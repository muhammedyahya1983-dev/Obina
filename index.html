<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23004d40'/%3E%3Ccircle cx='32' cy='32' r='18' fill='white'/%3E%3Cpath d='M22 24h20l-2 8H24l-2-8z' fill='%23004d40'/%3E%3Cpath d='M24 34h16l-1 6H25l-1-6z' fill='%2327ae60'/%3E%3C/svg%3E" type="image/svg+xml">
    <meta name="description" content="Obina Market is a fresh food and grocery ordering app for easy online orders, WhatsApp ordering, and fast contact.">
    <meta name="keywords" content="Obina, Obina Market, grocery ordering, food market, food store, WhatsApp order">
    <meta property="og:title" content="Obina Market">
    <meta property="og:description" content="Order groceries and food items from Obina Market quickly and easily.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Obina Market">
    <meta name="twitter:description" content="Order groceries and food items from Obina Market quickly and easily.">
    <title>Obina Market</title>
    <style>
        /* Base Page Setup */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f4;
            color: #2c3e50;
            margin: 0;
            padding: 0;
            padding-bottom: 120px;
        }

        .page-loader {
            position: fixed;
            inset: 0;
            background: rgba(244, 246, 244, 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loader-card {
            background: white;
            border-radius: 22px;
            padding: 24px 28px;
            box-shadow: 0 16px 38px rgba(0, 0, 0, 0.14);
            text-align: center;
            min-width: 230px;
            border: 1px solid #e5efe9;
        }
        .loader-icon-wrap {
            position: relative;
            width: 84px;
            height: 84px;
            margin: 0 auto 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, #004d40, #27ae60);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 8px rgba(255,255,255,0.2), 0 8px 18px rgba(0,77,64,0.18);
            animation: logo-breathe 1.1s ease-in-out infinite;
        }
        .loader-icon {
            font-size: 36px;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
        }
        .loader-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: #ffffff;
            color: #004d40;
            font-size: 14px;
            font-weight: 800;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.12);
        }
        .loader-card p {
            margin: 0;
            color: #004d40;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        @keyframes logo-breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Banner Header */
        .main-header {
            background: linear-gradient(135deg, #004d40, #00695c);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        .main-header h1 {
            margin: 0;
            font-size: 24px;
        }

        /* MASTER SCREEN BUTTONS NAVIGATION */
        .master-navigation-bar {
            display: flex;
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px;
            gap: 15px;
        }
        .master-btn {
            flex: 1;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        /* Style for Products Master Button */
        #master-products-btn {
            background-color: #ffffff;
            color: #004d40;
            border: 2px solid #004d40;
        }
        #master-products-btn.active {
            background-color: #004d40;
            color: #ffffff;
        }
        /* Style for Order Master Button */
        #master-order-btn {
            background-color: #ffffff;
            color: #27ae60;
            border: 2px solid #27ae60;
        }
        #master-order-btn.active {
            background-color: #27ae60;
            color: #ffffff;
        }

        /* Container Layout */
        .app-panel-wrapper {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 15px;
            box-sizing: border-box;
        }
        .display-view-panel {
            display: none;
        }
        .display-view-panel.active {
            display: block;
        }

        /* Category Boxes */
        .market-category-card {
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
        }
        .market-category-card h2 {
            margin-top: 0;
            color: #004d40;
            border-bottom: 2px solid #004d40;
            padding-bottom: 6px;
            font-size: 18px;
        }

        /* Product Rows formatting */
        .market-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 5px;
            border-bottom: 1px solid #edf2f7;
        }
        .market-item-row:last-child {
            border-bottom: none;
        }
        .item-text-info strong {
            font-size: 15px;
            color: #1a252f;
            display: block;
        }
        .item-text-info span {
            color: #718096;
            font-size: 13px;
        }
        .item-price-tag {
            font-weight: bold;
            color: #27ae60;
            font-size: 15px;
            margin-right: 15px;
            text-align: right;
            flex-grow: 1;
        }

        /* Clickable Selection Buttons */
        .add-item-btn {
            background-color: #004d40;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            min-width: 80px;
            text-align: center;
        }
        .add-item-btn:hover {
            background-color: #00695c;
        }

        /* Active Plus Minus Selectors */
        .counter-box-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #27ae60;
            border-radius: 6px;
            background-color: #ebf7ee;
            overflow: hidden;
            min-width: 80px;
            justify-content: space-between;
        }
        .counter-control-btn {
            background: none;
            border: none;
            padding: 6px 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            color: #27ae60;
        }
        .counter-control-btn:hover {
            background-color: #d4edd9;
        }
        .counter-control-btn:active,
        .add-item-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
        }
        .add-item-btn.pressed {
            animation: button-pop 0.2s ease;
        }
        .counter-box-wrapper.pulse {
            animation: button-pop 0.2s ease;
        }
        .counter-current-value {
            font-weight: bold;
            font-size: 14px;
            color: #27ae60;
        }

        @keyframes button-pop {
            0% { transform: scale(1); }
            50% { transform: scale(0.96); }
            100% { transform: scale(1); }
        }

        /* Order Review Screen Setup */
        .order-checkout-invoice-card {
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .order-empty-prompt {
            color: #a0aec0;
            text-align: center;
            padding: 40px 0;
            font-style: italic;
            margin: 0;
        }
        .total-bill-row {
            background-color: #fff;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-top: 15px;
            margin-bottom: 20px;
        }
        .order-title {
            margin-top: 0;
            color: #2d3748;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 10px;
        }
        .order-total-amount {
            color: #27ae60;
        }
        .whatsapp-dispatch-btn {
            width: 100%;
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.15);
        }

        /* Floating Contact Action Links Footer Bar */
        .floating-merchant-action-footer {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 500px;
            background-color: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            gap: 10px;
            box-sizing: border-box;
            z-index: 1000;
        }
        .footer-action-link {
            flex: 1;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            color: white;
        }
        .link-blue { background-color: #2f80ed; }
        .link-green { background-color: #219653; }
    </style>
</head>
<body>
    <div id="page-loader" class="page-loader">
        <div class="loader-card">
            <div class="loader-icon-wrap">
                <span class="loader-icon">�️</span>
                <span class="loader-badge">O</span>
            </div>
            <p>Loading Obina Market...</p>
        </div>
    </div>

    <!-- Header Strip -->
    <div class="main-header">
        <h1>🇳🇬 NAIJA FRESH MARKET</h1>
    </div>

    <!-- THE TWO MASTER NAVIGATION BUTTONS SCREEN CONTROLLERS -->
    <div class="master-navigation-bar">
        <button id="master-products-btn" class="master-btn active" onclick="activatePanel('products')">🛍️ Products Button</button>
        <button id="master-order-btn" class="master-btn" onclick="activatePanel('order')">📋 Order Button (<span id="master-badge-counter">0</span>)</button>
    </div>

    <!-- Active Views Panel Frame Box -->
    <div class="app-panel-wrapper">
        
        <!-- PANEL 1: PRODUCTS SHEET DISPLAY -->
        <div id="panel-view-products" class="display-view-panel active">
            <div class="market-category-card">
                <h2>1. Grains, Beans & Cereals</h2>
                <div id="grains-target-list"></div>
            </div>

            <div class="market-category-card">
                <h2>2. Oils</h2>
                <div id="oils-target-list"></div>
            </div>

            <div class="market-category-card">
                <h2>3. Pastes, Produce & Provisions</h2>
                <div id="provisions-target-list"></div>
            </div>
        </div>

        <!-- PANEL 2: ORDER BASKET REVIEW DISPLAY -->
        <div id="panel-view-order" class="display-view-panel">
            <div class="order-checkout-invoice-card">
                <h3 class="order-title">Selected Order Items</h3>
                <div id="active-order-list-inside">
                    <p class="order-empty-prompt">Your order list is empty. Click the Products Button to choose items.</p>
                </div>
            </div>
            
            <div class="total-bill-row">
                <span>Total Amount Due:</span>
                <span class="order-total-amount">₦<span id="bill-grand-total">0</span></span>
            </div>
            
            <button onclick="dispatchToWhatsApp()" class="whatsapp-dispatch-btn">
                Send Order via WhatsApp 💬
            </button>
        </div>

    </div>

    <!-- Quick Dial Communications Footer -->
    <div class="floating-merchant-action-footer">
        <a id="merchant-phone" href="tel:+2348030000000" class="footer-action-link link-blue">📞 Call Merchant</a>
        <a id="merchant-chat" href="https://wa.me" target="_blank" rel="noopener noreferrer" class="footer-action-link link-green">💬 Chat Live</a>
    </div>

    <!-- JAVASCRIPT APPLICATION LOGIC DIRECT LINK INSIDE SINGLE SCRIPT CONTAINER -->
    <script>
        const SELLER_WHATSAPP = "2348056689061";
        const marketCatalog = [
            { category: 'grains', name: 'Yellow Garri', measure: '1 Derika', price: 300 },
            { category: 'grains', name: 'Yellow Garri', measure: '1 Meycup', price: 150 },
            { category: 'grains', name: 'Yellow Garri', measure: 'Half Paint', price: 600 },
            { category: 'grains', name: 'Yellow Garri', measure: 'One Rubber', price: 1200 },
            { category: 'grains', name: 'White Garri', measure: '1 Derika', price: 1100 },
            { category: 'grains', name: 'White Garri', measure: '1 Meycup', price: 550 },
            { category: 'grains', name: 'Rice', measure: '1 Derika', price: 1800 },
            { category: 'grains', name: 'Rice', measure: 'Half Paint', price: 3500 },
            { category: 'grains', name: 'Groundnut', measure: '1 Derika', price: 2200 },
            { category: 'grains', name: 'Beans (Olomowewe)', measure: '1 Derika', price: 2000 },
            { category: 'grains', name: 'Beans (Oloyin)', measure: '1 Derika', price: 2500 },
            { category: 'grains', name: 'Beans (Drum)', measure: '1 Derika', price: 2100 },
            { category: 'grains', name: 'White Beans', measure: '1 Derika', price: 1800 },
            { category: 'grains', name: 'Jero (Millet)', measure: '1 Derika', price: 1400 },
            { category: 'grains', name: 'Okababa (Guinea Corn)', measure: '1 Derika', price: 1500 },
            { category: 'oils', name: 'Palm Oil', measure: '1 Bottle', price: 1500 },
            { category: 'oils', name: 'Palm Oil', measure: '2 Bottles', price: 3000 },
            { category: 'oils', name: 'Palm Oil', measure: '2.5 Litre Keg', price: 6000 },
            { category: 'oils', name: 'Groundnut Oil', measure: '1 Bottle', price: 1800 },
            { category: 'oils', name: 'Groundnut Oil', measure: '2 Bottles', price: 3600 },
            { category: 'oils', name: 'Groundnut Oil', measure: '2.5 Litre Keg', price: 7000 },
            { category: 'provisions', name: 'Tomato Paste', measure: '1 Sachet', price: 350 },
            { category: 'provisions', name: 'Pepper Paste', measure: '1 Sachet', price: 400 },
            { category: 'provisions', name: 'Onion', measure: '1 Sachet Bag', price: 1500 },
            { category: 'provisions', name: 'Salt', measure: '1 Sachet Pack', price: 250 },
            { category: 'provisions', name: 'Sugar', measure: '1 Sachet Pack', price: 1200 },
            { category: 'provisions', name: 'Sardin', measure: '1 Tin', price: 1100 },
            { category: 'provisions', name: 'Geisha', measure: '1 Tin', price: 1100 },
            { category: 'provisions', name: 'Seasoning (Maggi)', measure: '1 Pack', price: 1100 }
        ];

        const basket = {};

        document.getElementById('merchant-phone').href = `tel:+${SELLER_WHATSAPP}`;
        document.getElementById('merchant-chat').href = `https://wa.me/${SELLER_WHATSAPP}?text=Hello%20I%20would%20like%20to%20order%20from%20Obina.`;

        function activatePanel(targetView) {
            document.getElementById('panel-view-products').classList.remove('active');
            document.getElementById('panel-view-order').classList.remove('active');
            document.getElementById(`panel-view-${targetView}`).classList.add('active');

            document.getElementById('master-products-btn').classList.remove('active');
            document.getElementById('master-order-btn').classList.remove('active');
            document.getElementById(`master-${targetView}-btn`).classList.add('active');
        }

        function renderProducts() {
            const sections = {
                grains: document.getElementById('grains-target-list'),
                oils: document.getElementById('oils-target-list'),
                provisions: document.getElementById('provisions-target-list')
            };

            Object.entries(sections).forEach(([key, container]) => {
                if (!container) return;
                const items = marketCatalog.filter(item => item.category === key);
                container.innerHTML = items.map(item => {
                    const uniqueKey = `${item.name}-${item.measure}`.replace(/[^a-zA-Z0-9]/g, '-');
                    const qty = basket[uniqueKey] || 0;
                    return `
                        <div class="market-item-row">
                            <div class="item-text-info">
                                <strong>${item.name}</strong>
                                <span>${item.measure}</span>
                            </div>
                            <div class="item-price-tag">₦${item.price.toLocaleString()}</div>
                            ${qty > 0 ? `
                                <div class="counter-box-wrapper pulse" data-key="${uniqueKey}">
                                    <button class="counter-control-btn" data-action="minus" data-key="${uniqueKey}">−</button>
                                    <span class="counter-current-value">${qty}</span>
                                    <button class="counter-control-btn" data-action="plus" data-key="${uniqueKey}">+</button>
                                </div>` : `
                                <button class="add-item-btn" data-action="add" data-key="${uniqueKey}">Add</button>`
                            }
                        </div>`;
                }).join('');
            });
        }

        function updateOrderSummary() {
            const orderList = document.getElementById('active-order-list-inside');
            const totalSpan = document.getElementById('bill-grand-total');
            const badgeSpan = document.getElementById('master-badge-counter');
            const selectedItems = Object.entries(basket).filter(([, qty]) => qty > 0);
            let total = 0;
            let itemCount = 0;

            if (selectedItems.length === 0) {
                orderList.innerHTML = '<p class="order-empty-prompt">Your order list is empty. Add items from the Products view.</p>';
                totalSpan.textContent = '0';
                badgeSpan.textContent = '0';
                return;
            }

            orderList.innerHTML = selectedItems.map(([key, qty]) => {
                const item = marketCatalog.find(entry => `${entry.name}-${entry.measure}`.replace(/[^a-zA-Z0-9]/g, '-') === key);
                if (!item) return '';
                const itemTotal = item.price * qty;
                total += itemTotal;
                itemCount += qty;
                return `
                    <div class="market-item-row" style="padding: 10px 0;">
                        <div class="item-text-info">
                            <strong>${item.name}</strong>
                            <span>${item.measure} × ${qty}</span>
                        </div>
                        <div class="item-price-tag">₦${itemTotal.toLocaleString()}</div>
                    </div>`;
            }).join('');

            totalSpan.textContent = total.toLocaleString();
            badgeSpan.textContent = itemCount;
        }

        function handleProductAction(event) {
            const button = event.target.closest('button[data-key]');
            if (!button) return;

            const key = button.getAttribute('data-key');
            const action = button.getAttribute('data-action');
            button.classList.add('pressed');
            setTimeout(() => button.classList.remove('pressed'), 180);

            if (action === 'add') {
                basket[key] = 1;
            } else if (action === 'plus') {
                basket[key] = (basket[key] || 0) + 1;
            } else if (action === 'minus') {
                basket[key] = Math.max(0, (basket[key] || 0) - 1);
                if (basket[key] === 0) delete basket[key];
            }

            renderProducts();
            updateOrderSummary();
        }

        function dispatchToWhatsApp() {
            const selectedItems = Object.entries(basket).filter(([, qty]) => qty > 0);
            if (selectedItems.length === 0) {
                alert('Please add at least one item first.');
                return;
            }

            let total = 0;
            const messageBody = selectedItems.map(([key, qty]) => {
                const item = marketCatalog.find(entry => `${entry.name}-${entry.measure}`.replace(/[^a-zA-Z0-9]/g, '-') === key);
                if (!item) return `${key} x${qty}`;

                const itemTotal = item.price * qty;
                total += itemTotal;
                return `${item.name} (${item.measure}) x${qty} = ₦${itemTotal.toLocaleString()}`;
            }).join('\n');

            const encoded = encodeURIComponent(`Hello, I would like to order the following items from Obina:\n\n${messageBody}\n\nTotal: ₦${total.toLocaleString()}`);
            window.open(`https://wa.me/${SELLER_WHATSAPP}?text=${encoded}`, '_blank', 'noopener,noreferrer');
        }

        const loader = document.getElementById('page-loader');

        document.addEventListener('click', handleProductAction);
        document.getElementById('master-products-btn').addEventListener('click', () => activatePanel('products'));
        document.getElementById('master-order-btn').addEventListener('click', () => activatePanel('order'));
        document.querySelector('.whatsapp-dispatch-btn').addEventListener('click', dispatchToWhatsApp);

        document.querySelector('.main-header h1').textContent = 'OBINA MARKET';
        renderProducts();
        updateOrderSummary();
        activatePanel('products');

        window.addEventListener('load', () => {
            setTimeout(() => {
                loader.classList.add('hidden');
            }, 900);
        });
    </script>
